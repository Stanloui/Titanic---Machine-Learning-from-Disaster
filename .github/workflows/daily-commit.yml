name: Daily Commit

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Make daily update
        run: |
          echo "Last updated: $(date)" >> activity-log.txt

      - name: Commit and push
        run: |
          git config user.name "Stanloui"
          git config user.email "your-email@example.com"
          git add activity-log.txt
          git commit -m "Daily update: $(date '+%Y-%m-%d %H:%M')"
          git push
